services:
  - type: web
    name: charlie-pc-backend
    env: node
    rootDir: backend
    buildCommand: rm -rf node_modules && npm install
    startCommand: npm run start:prod
    healthCheckPath: /health
    disk:
      name: charlie-pc-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/database.sqlite
      - key: ENABLE_DB_BACKUPS
        value: false
      - key: SEED_DEFAULT_USERS
        value: false
